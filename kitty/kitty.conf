font_family      monospace
font_size        13.0
window_padding_width 8
tab_bar_edge top
tab_bar_style powerline
macos_show_window_title_in none

# Hide macOS title bar
hide_window_decorations titlebar-only

# Tab management
map cmd+t new_tab
map cmd+w close_tab

# Switch tabs by number
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# GitHub Dark Default — kitty theme
# Source: primer/github-vscode-theme (P3→sRGB)

foreground               #e6edf3
background               #24292e
selection_foreground     #e6edf3
selection_background     #264f78

cursor                   #0083ff
cursor_text_color        #010409

url_color                #58a6ff

active_tab_foreground    #e6edf3
active_tab_background    #315892
inactive_tab_foreground  #6e7681
inactive_tab_background  #334c7b

# Normal
color0  #484f58
color1  #ff7b72
color2  #3fb950
color3  #d29922
color4  #58a6ff
color5  #bc8cff
color6  #39c5cf
color7  #b1bac4

# Bright
color8   #6e7681
color9   #ffa198
color10  #56d364
color11  #e3b341
color12  #79c0ff
color13  #d2a8ff
color14  #56d4dd
color15  #ffffff